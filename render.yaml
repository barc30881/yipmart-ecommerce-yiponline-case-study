services:
  - type: web
    name: yipmart
    runtime: docker
    repo: https://github.com/barc30881/yipmart-ecommerce-yiponline-case-study
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
    buildCommand: |
      composer install --optimize-autoloader --no-dev --no-interaction &&
      npm ci &&
      npm run build &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT