services:
  - type: web
    name: yipmart
    runtime: docker
    repo: https://github.com/barc30881/yipmart-ecommerce-yiponline-case-study  # ← Change if your username is different
    plan: free
    branch: main
    rootDir: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true          # Render will auto-generate a secure key
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
    buildCommand: |
      composer install --optimize-autoloader --no-dev --no-interaction && 
      npm install && npm run build && 
      php artisan config:cache && 
      php artisan route:cache && 
      php artisan view:cache && 
      php artisan module:migrate YipEcommerce --force && 
      php artisan module:seed YipEcommerce --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT